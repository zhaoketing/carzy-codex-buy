    (function () {
      var debug = new URLSearchParams(location.search).get('debug') === '1';

      var panel = null;
      function render() {
        if (!panel || !panel.isConnected) {
          if (!document.body) return;
          panel = document.createElement('pre');
          panel.style.cssText = [
            'position:fixed', 'left:0', 'right:0', 'bottom:0',

            '-webkit-user-select:text', 'user-select:text'
          ].join(';');
          document.body.appendChild(panel);
        }
        panel.textContent = lines.slice(-80).join('\n');
      }
      function log(msg) {
        lines.push(new Date().toLocaleTimeString() + ' ' + msg);
        render();
      }
      window.__mobileDebugLog = log;
      window.addEventListener('DOMContentLoaded', function () {
        log('debug panel ready');
        log('ua: ' + navigator.userAgent);
        log('url: ' + location.href);
        document.querySelectorAll('script[src]').forEach(function (script) {
          log('script tag: ' + script.getAttribute('src'));
        });
      });
      window.addEventListener('load', function () {
        log('window load');
      });
      window.addEventListener('error', function (event) {
        log('ERROR: ' + (event.message || 'unknown') + ' @ ' + event.filename + ':' + event.lineno + ':' + event.colno);
      }, true);
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason;
        log('PROMISE: ' + (reason && (reason.stack || reason.message) || reason));
      });
      if (window.fetch) {
        var originalFetch = window.fetch;
        window.fetch = function () {
          var url = arguments[0] && arguments[0].url || arguments[0];
          return originalFetch.apply(this, arguments).then(function (res) {
            if (!res.ok) log('FETCH ' + res.status + ': ' + url);
            return res;
          }, function (err) {
            log('FETCH FAILED: ' + url + ' ' + (err && err.message || err));
            throw err;
          });
        };
      }
      var originalCreateElement = document.createElement.bind(document);
      document.createElement = function (tagName) {
        var element = originalCreateElement(tagName);
        if (String(tagName).toLowerCase() === 'script') {
          element.addEventListener('load', function () {
            log('dynamic script loaded: ' + (element.src || element.getAttribute('src') || 'inline'));
          });
          element.addEventListener('error', function () {
            log('dynamic script error: ' + (element.src || element.getAttribute('src') || 'inline'));
          });
        }
        return element;
      };
      function probe(label) {
        var canvas = document.getElementById('GameCanvas');
        var gameDiv = document.getElementById('GameDiv');
        var info = [label];
        info.push('ready=' + document.readyState);
        info.push('System=' + !!window.System);
        info.push('cc=' + !!window.cc);
        if (canvas) {
          var rect = canvas.getBoundingClientRect();
          info.push('canvas=' + Math.round(rect.width) + 'x' + Math.round(rect.height));
          info.push('buffer=' + canvas.width + 'x' + canvas.height);
          try {
            info.push('webgl=' + !!(canvas.getContext('webgl2') || canvas.getContext('webgl')));
          } catch (err) {
            info.push('webglErr=' + err.message);
          }
        } else {
          info.push('canvas=missing');
        }
        if (gameDiv) {
          var gameRect = gameDiv.getBoundingClientRect();
          info.push('gameDiv=' + Math.round(gameRect.width) + 'x' + Math.round(gameRect.height));
        }
        log(info.join(' | '));
      }
      [500, 1500, 3000, 8000, 15000].forEach(function (ms) {
        setTimeout(function () { probe('probe+' + ms + 'ms'); }, ms);
      });
